# Configurações do Banco de Dados para DEPLOY NO RAILWAY - AJUSTADO PARA AS VARIAVEIS QUE O RAILWAY ESTÁ INJETANDO
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.main.allow-circular-references=true

# Configurações JWT - usando as variáveis que você já tem no servico de backend (elas parecem estar corretas)
jwt.secret-key=${jwt.secret-key}
jwt.expiration-time=${jwt.expiration-time}

# Propriedades de Debug para verificar a URL e credenciais injetadas (Mantenha para o proximo deploy de teste)
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.jdbc.datasource=DEBUG