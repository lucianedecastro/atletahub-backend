# Configuraï¿½ï¿½es do Banco de Dados para DEPLOY NO RAILWAY
# Use as variï¿½veis conforme elas aparecem no seu serviï¿½o de backend no Railway (atletahub-api)
spring.datasource.url=${MYSQL_URL} # Esta ï¿½ a que o Railway injeta como a URL interna completa
